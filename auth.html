<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 - AI 튜터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="toast-container"></div>

    <div class="aura-wrapper">
        <div class="aura-container">
            <div class="screen" id="auth-screen">
                <!-- 1. 로그인 화면 -->
                <div id="login-view" style="display: block;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; color: var(--primary);">👋 환영합니다</h2>
                    <p style="margin-bottom: 35px; color: #64748b; font-weight: 500;">이메일 또는 아이디로 로그인하세요.</p>

                    <div class="input-wrap">
                        <label>이메일 또는 아이디</label>
                        <input type="text" id="login-id" placeholder="아이디 또는 이메일 입력">
                    </div>
                    <div class="input-wrap">
                        <label>비밀번호</label>
                        <input type="password" id="login-pw" placeholder="비밀번호 입력">
                    </div>

                    <button onclick="login()" style="margin-top: 10px; height: 56px;">로그인</button>

                    <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
                        <span style="color: #888;">처음이신가요?</span>
                        <a href="javascript:void(0)" onclick="toggleAuth('register')" style="color: var(--primary); font-weight: 700; text-decoration: none; margin-left: 5px;">회원가입 하기</a>
                    </div>
                </div>

                <!-- 2. 회원가입 화면 -->
                <div id="register-view" style="display: none;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; color: var(--primary);">✨ 시작해봐요</h2>
                    <p style="margin-bottom: 35px; color: #64748b; font-weight: 500;">새로운 학습 여정을 함께하세요.</p>

                    <div class="input-wrap">
                        <label>이메일 주소</label>
                        <input type="email" id="reg-email" placeholder="사용 중인 이메일">
                    </div>
                    <div class="input-wrap">
                        <label>아이디</label>
                        <input type="text" id="reg-id" placeholder="사용할 아이디">
                    </div>
                    <div class="input-wrap">
                        <label>비밀번호</label>
                        <input type="password" id="reg-pw" placeholder="8자 이상의 비밀번호">
                    </div>

                    <button onclick="register()" style="margin-top: 10px; height: 56px;">가입 완료</button>

                    <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
                        <span style="color: #888;">이미 계정이 있나요?</span>
                        <a href="javascript:void(0)" onclick="toggleAuth('login')" style="color: var(--primary); font-weight: 700; text-decoration: none; margin-left: 5px;">로그인 하기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg, type="info") {
            const container = document.querySelector(".toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = "fadeOut 0.5s forwards"; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function toggleAuth(view) {
            document.getElementById('login-view').style.display = view === 'login' ? 'block' : 'none';
            document.getElementById('register-view').style.display = view === 'register' ? 'block' : 'none';
        }

        async function login() {
            const user_id = document.getElementById('login-id').value;
            const password = document.getElementById('login-pw').value;
            if(!user_id || !password) return showToast("정보를 입력해주세요.", "error");

            const res = await fetch('/api/login', {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id, password})
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem("user_id", data.user_id);
                location.href = '/';
            } else {
                const data = await res.json();
                showToast(data.detail, "error");
            }
        }

        async function register() {
            const user_id = document.getElementById('reg-id').value;
            const password = document.getElementById('reg-pw').value;
            const email = document.getElementById('reg-email').value;
            if(!user_id || !password || !email) return showToast("모든 정보를 입력하세요.", "error");

            const res = await fetch('/api/register', {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id, password, email})
            });
            if(res.ok) {
                showToast("🎉 회원가입 성공!", "success");
                setTimeout(() => toggleAuth('login'), 1500);
            } else {
                const data = await res.json();
                showToast(data.detail, "error");
            }
        }

        window.onload = async () => {
            if(location.pathname === '/register') toggleAuth('register');
        };
    </script>
</body>
</html>
