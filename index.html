<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 튜터 - 스마트한 역질문 학습</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="toast-container"></div>

    <!-- 📱 사이드바 -->
    <div class="sidebar">
        <div class="new-chat-btn" onclick="location.reload()">+ 새로운 대화</div>
        <div style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px; padding-left: 10px; font-weight: 700; letter-spacing: 0.5px;">최근 기록</div>
        <div id="history-list" class="history-list"></div>

        <div class="sidebar-footer">
            <div class="profile-btn" onclick="showAuraScreen('profile-aura')">
                <div style="width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: white;">U</div>
                <div id="sidebar-user-id" style="font-size: 0.9rem; font-weight: 600;">사용자</div>
            </div>
            <div class="logout-text" onclick="logout()">🚪 로그아웃</div>
        </div>
    </div>

    <!-- 🖼️ 메인 컨텐츠 영역 -->
    <div class="main-content">

        <div id="aura-wrapper" class="aura-wrapper">

            <!-- 👤 프로필 설정 -->
            <div id="profile-aura" class="aura-container" style="display: none;">
                <div class="screen" style="text-align: center;">
                    <h2 style="font-weight: 800; color: var(--primary);">👤 프로필 설정</h2>
                    <p style="color: #64748b; margin-bottom: 25px;">내 정보를 업데이트하세요.</p>
                    <div class="input-wrap">
                        <label>나이</label>
                        <input type="number" id="profile-age" placeholder="예: 18">
                    </div>
                    <div class="input-wrap">
                        <label>학교</label>
                        <input type="text" id="profile-school" placeholder="예: 부산고등학교">
                    </div>
                    <button onclick="saveProfile()">저장하기</button>
                    <button onclick="showAuraScreen('main-menu-aura')" class="btn-sub" style="margin-top: 10px;">메인 메뉴로 돌아가기</button>
                </div>
            </div>

            <!-- 🏠 메인 메뉴 화면 -->
            <div id="main-menu-aura" class="aura-container" style="display: block;">
                <div class="screen" style="text-align: center;">
                    <h2 style="font-weight: 800; color: var(--primary);">메인 메뉴</h2>
                    <p style="color: #64748b; margin-bottom: 25px;">어떤 기능을 사용하시겠어요?</p>
                    <button onclick="showAuraScreen('ai-setup-aura')">🎓 AI 튜터 시작하기</button>
                    <button onclick="showAuraScreen('community-aura')" class="btn-sub" style="margin-top: 10px;">🏆 자랑용 커뮤니티 보기</button>
                </div>
            </div>

            <!-- 🎓 학습 주제 설정 -->
            <div id="ai-setup-aura" class="aura-container" style="display: none;">
                <div class="screen" style="text-align: center;">
                    <h2>🎓 학습 시작</h2>
                    <p>어떤 내용을 복습해볼까요?</p>
                    <div class="input-wrap">
                        <label>모델 선택</label>
                        <select id="ai-model">
                            <option value="groq">Groq (Llama 3.3)</option>
                            <option value="gemini">Gemini (2.0 Flash)</option>
                        </select>
                    </div>
                    <div class="input-wrap">
                        <label>과목</label>
                        <select id="ai-category">
                            <option>국어</option><option>수학</option><option>과학</option><option>영어</option>
                        </select>
                    </div>
                    <div class="input-wrap">
                        <label>주제</label>
                        <input type="text" id="ai-topic" placeholder="예: 광합성, 인수분해">
                    </div>
                    <div class="input-wrap">
                        <label>난이도: <span id="diff-value">5</span></label>
                        <input type="range" id="ai-difficulty" min="1" max="10" value="5" oninput="document.getElementById('diff-value').innerText=this.value">
                    </div>
                    <button onclick="startChat()">대화 시작하기 🚀</button>
                    <button onclick="showAuraScreen('main-menu-aura')" class="btn-sub" style="margin-top: 10px;">메인 메뉴로 돌아가기</button>
                </div>
            </div>

            <!-- 🏆 커뮤니티 화면 -->
            <div id="community-aura" class="aura-container" style="display: none;">
                <div class="screen" style="text-align: center;">
                    <h2 style="font-weight: 800; color: var(--primary);">🏆 자랑 게시판</h2>
                    <p style="color: #64748b; margin-bottom: 20px;">내 학습 결과를 친구들에게 자랑해보세요!</p>

                    <div style="background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left;">
                        <label style="margin-bottom: 5px; font-size: 0.8rem;">자랑할 내용</label>
                        <input type="text" id="community-post-input" placeholder="예: 오늘 광합성 100점 맞았어요!" style="margin-bottom: 10px;">
                        <button onclick="writeCommunityPost()" style="padding: 10px; font-size: 0.9rem;">글 올리기</button>
                    </div>

                    <div id="community-posts-list" style="text-align: left; max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 10px; background: white;">
                        <p style="color: #94a3b8;">게시글을 불러오는 중...</p>
                    </div>
                    <button onclick="showAuraScreen('main-menu-aura')" class="btn-sub" style="margin-top: 20px;">메인 메뉴로 돌아가기</button>
                </div>
            </div>

        </div>

        <!-- 💬 채팅 UI -->
        <div id="chat-ui" style="display: none; height: 100%; width: 100%; flex-direction: column;">
            <div id="chat-container" class="chat-container">
                <div class="chat-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <!-- 뒤로가기 버튼 추가 -->
                        <div class="back-btn" onclick="showAuraScreen('main-menu-aura')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        </div>
                        <h2 id="chat-title" style="margin:0; font-size: 1.5rem; font-weight: 800; color: #1e293b;">채팅</h2>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px;">학습 이해도</div>
                        <div style="font-size: 1.2rem; font-weight: 800; color: var(--primary);"><span id="current-score">0</span>%</div>
                        <div class="gauge-wrapper" style="width: 100px; margin-top: 5px;">
                            <div id="score-gauge" class="gauge-fill"></div>
                        </div>
                    </div>
                </div>

                <div id="chat-box" class="chat-box"></div>
                <div id="typing-indicator" style="display:none; color:#94a3b8; font-size:0.8rem; margin-top:20px;">AI가 생각 중...</div>
            </div>

            <!-- 💡 힌트 슬라이더 추가 -->
            <div id="hint-slider" class="hint-slider">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.2rem;">💡</span>
                    <span id="hint-text" style="font-size: 0.9rem; font-weight: 600; color: #856404;">힌트가 도착했습니다!</span>
                </div>
                <div onclick="hideHint()" style="cursor: pointer; padding: 5px;">×</div>
            </div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="여기에 내용을 설명해주세요..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="send-btn" onclick="sendChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

    </div>

    <!-- 🖼️ 커스텀 확인 모달 -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: #1e293b;">정말 삭제할까요?</h3>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">삭제된 대화 기록은 복구할 수 없습니다.</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeConfirmModal()" class="btn-sub" style="flex: 1; padding: 12px;">취소</button>
                <button id="modal-confirm-btn" style="flex: 1; padding: 12px; background: var(--danger);">삭제</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        if(!localStorage.getItem("user_id")) location.href = '/login';
        else {
            document.getElementById('sidebar-user-id').innerText = localStorage.getItem("user_id");
            showAuraScreen('main-menu-aura');
            loadHistory();
        }
    </script>
</body>
</html>
